<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapiró Recap 25-26</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', serif; background: #000; color: #fff; overflow-x: hidden; }
        header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        main { scroll-snap-type: y mandatory; height: 100vh; overflow-y: scroll; }
        section { height: 100vh; width: 100vw; scroll-snap-align: start; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; position: relative; }
        .section-title { font-size: 1.8rem; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        
        .media-wrapper { width: 100%; max-width: 400px; height: 70vh; position: relative; background: #111; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .media-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        img, video { width: 100%; height: 100%; object-fit: cover; }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; z-index: 10; backdrop-filter: blur(5px); }
        .prev { left: 10px; }
        .next { right: 10px; }
        .no-content { color: #555; font-style: italic; text-align: center; padding: 20px; }
        .counter { position: absolute; bottom: 10px; right: 20px; font-size: 0.8rem; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 10px; }

        /* Fondos por mes */
        section:nth-child(odd) { background: #0c0c0c; }
        section:nth-child(even) { background: #151515; }
    </style>
</head>
<body>

<header><h1>🎬 TAPIRÓ 25-26</h1></header>
<main id="content"></main>

<script src="lista.js"></script>

<script>
    const meses = [
        { id: 'SEP25', n: 'Septiembre 2025' }, { id: 'OCT25', n: 'Octubre 2025' },
        { id: 'NOV25', n: 'Noviembre 2025' }, { id: 'DEC25', n: 'Diciembre 2025' },
        { id: 'JAN26', n: 'Enero 2026' }, { id: 'FEB26', n: 'Febrero 2026' },
        { id: 'MAR26', n: 'Marzo 2026' }, { id: 'APR26', n: 'Abril 2026' },
        { id: 'MAY26', n: 'Mayo 2026' }, { id: 'JUN26', n: 'Junio 2026' },
        { id: 'extra', n: '✨ Lo Mejor' }
    ];

    const main = document.getElementById('content');
    const indices = {}; // Para rastrear en qué foto está cada mes

    function renderMedia(mesId, index) {
        const archivos = mediaFiles[mesId];
        const container = document.getElementById(`media-${mesId}`);
        const counter = document.getElementById(`count-${mesId}`);
        const file = archivos[index];
        const path = `media/${mesId}/${file}`;

        container.innerHTML = file.endsWith('.mp4') 
            ? `<video src="${path}" autoplay muted loop playsinline></video>`
            : `<img src="${path}">`;
        
        counter.innerText = `${index + 1} / ${archivos.length}`;
    }

    function cambiarImagen(mesId, direccion) {
        const archivos = mediaFiles[mesId];
        indices[mesId] = (indices[mesId] + direccion + archivos.length) % archivos.length;
        renderMedia(mesId, indices[mesId]);
    }

    meses.forEach(m => {
        const sec = document.createElement('section');
        const archivos = (typeof mediaFiles !== 'undefined') ? mediaFiles[m.id] : null;
        
        if (archivos && archivos.length > 0) {
            indices[m.id] = 0;
            sec.innerHTML = `
                <h2 class="section-title">${m.n}</h2>
                <div class="media-wrapper">
                    <button class="nav-btn prev" onclick="cambiarImagen('${m.id}', -1)">❮</button>
                    <div class="media-container" id="media-${m.id}"></div>
                    <button class="nav-btn next" onclick="cambiarImagen('${m.id}', 1)">❯</button>
                    <div class="counter" id="count-${m.id}"></div>
                </div>`;
            main.appendChild(sec);
            renderMedia(m.id, 0);
        } else {
            sec.innerHTML = `<h2 class="section-title">${m.n}</h2><p class="no-content">No hay imágenes disponibles para este mes</p>`;
            main.appendChild(sec);
        }
    });
</script>
</body>
</html>
