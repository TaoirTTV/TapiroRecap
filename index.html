        section { width: 100%; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 60px 20px; position: relative; overflow: hidden; }

        section > * { position: relative; z-index: 1; }
        .section-title { font-size: 3rem; margin-bottom: 40px; text-align: center; font-weight: 700; text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); animation: fadeInDown 0.8s ease-out; }
        .carousel-container { width: 100%; max-width: 900px; position: relative; display: flex; align-items: center; gap: 20px; animation: fadeInUp 0.8s ease-out 0.2s backwards; }
        .carousel { width: 100%; background: rgba(255, 255, 255, 0.1); border-radius: 20px; overflow: hidden; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); aspect-ratio: 16 / 9; }
        .carousel-inner { display: flex; height: 100%; transition: transform 0.5s ease-in-out; }
        .carousel-item { min-width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.2); position: relative; }
        .carousel-item img, .carousel-item video { width: 100%; height: 100%; object-fit: cover; }
        .carousel-nav { background: rgba(255, 255, 255, 0.2); border: none; color: white; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; transition: all 0.3s ease; }
        .carousel-nav:hover { background: rgba(255, 255, 255, 0.4); transform: scale(1.1); }
        .carousel-indicators { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
        .indicator { width: 12px; height: 12px; border-radius: 50%; background: rgba(255, 255, 255, 0.3); cursor: pointer; transition: all 0.3s ease; }
        .indicator.active { background: white; transform: scale(1.3); }
        .indicator:hover { background: rgba(255, 255, 255, 0.7); }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { header h1 { font-size: 1.8rem; } .section-title { font-size: 2rem; } }
        html { scroll-behavior: smooth; }
    </style>

    <script>
        const carousels = [{currentIndex:0,itemCount:2},{currentIndex:0,itemCount:2},{currentIndex:0,itemCount:2},{currentIndex:0,itemCount:2},{currentIndex:0,itemCount:2},{currentIndex:0,itemCount:2},{currentIndex:0,itemCount:2},{currentIndex:0,itemCount:2},{currentIndex:0,itemCount:2},{currentIndex:0,itemCount:2},{currentIndex:0,itemCount:2}];
        function updateCarousel(i){const c=carousels[i];const inner=document.getElementById(`carousel-inner-`+i);const offset=-c.currentIndex*100;inner.style.transform=`translateX(`+offset+`%)`;updateIndicators(i);}
        function updateIndicators(i){document.querySelectorAll(`#indicators-`+i+` .indicator`).forEach((ind,idx)=>{ind.classList.toggle('active',idx===carousels[i].currentIndex);});}
        function nextSlide(i){carousels[i].currentIndex=(carousels[i].currentIndex+1)%carousels[i].itemCount;updateCarousel(i);}
        function prevSlide(i){carousels[i].currentIndex=(carousels[i].currentIndex-1+carousels[i].itemCount)%carousels[i].itemCount;updateCarousel(i);}
        function setSlide(i,n){carousels[i].currentIndex=n;updateCarousel(i);}
        function initializeCarousel(i,cnt){carousels[i].itemCount=cnt;const container=document.getElementById(`indicators-`+i);container.innerHTML='';for(let j=0;j<cnt;j++){const ind=document.createElement('div');ind.className='indicator'+(j===0?' active':'');ind.onclick=()=>setSlide(i,j);container.appendChild(ind);}}
        document.addEventListener('DOMContentLoaded',()=>{carousels.forEach((_,i)=>{initializeCarousel(i,2);});});
        document.addEventListener('keydown',(e)=>{if(e.key==='ArrowRight'){const a=Math.floor(window.scrollY/window.innerHeight);if(a<carousels.length)nextSlide(a);}else if(e.key==='ArrowLeft'){const a=Math.floor(window.scrollY/window.innerHeight);if(a<carousels.length)prevSlide(a);}});
    </script>
